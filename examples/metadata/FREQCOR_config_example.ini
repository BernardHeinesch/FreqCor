[IO]
#1 = Read routine selection. FREQCOR_Read_EP (standard EddyPro run) or FREQCOR_Read_TOF (GEddySoft/TOF)
read_routine = FREQCOR_Read_EP
# Paths below must be either absolute, or relative to the project root folder (the main repository folder).
#2 = Path to the folder containing the full_output EP file
input_path = examples/data
#2b = Path to the folder containing the eddypro_binned_cospectra
input_path_sp = examples/data
#3 = Path (full, including file name) to file containing Massman coefficients 
#    for the site of interest. Optional. Used for plotting of the reference Massman cospectra only.
massman_path = examples/data/Massman_coef.csv
#4 = Path to input file (csv) containing the ICOS-ETC global flux flag computed 
#according to Vitale et al. 2020. Is only used when the "vitale_qc_flags" option is set to 1 in [PROCEDURE_OPTIONS].
vitale_path = examples/data
#5 = Name of binned cospectra files (and folder)
binned_cosp = _binned_cospectra_
#6 = Name of file containing flux, meteo and QC data.
flx_meteo = full_output
#7 = Path to output folder
output_path = examples/output
#8 = Base name used only for intermediate outputs/cache (i.e. if [PROCESSED_DATA], #1 =1) 
#    and not for the main run_tag-named outputs
output_file = Lonzee_June_2024_out_cosp

[TIME_WINDOW]
#1 = Enable time window filtering (0: disabled, 1: enabled)
enable_time_window = 0
#2 = Start date and time of the processing window. Format: YYYY-MM-DD HH:MM, used only if #1 = 1
start_datetime = 2024-05-01 00:30
#3 = End date and time of the processing window. Format: YYYY-MM-DD HH:MM, used only if #1 = 1
end_datetime = 2024-05-20 23:30
#4 = Enable exclusion of sub-periods within the processing window (0: disabled, 1: enabled)
enable_exclusion_windows = 0
#5 = Start date(s) of exclusion window(s). Format: YYYY-MM-DD HH:MM. Multiple windows: comma-separated (e.g. 2022-06-05 00:00, 2022-06-20 12:00), used only if #4 = 1
date_exclusion_start = 2024-06-01 00:00
#6 = End date(s) of exclusion window(s). Format: YYYY-MM-DD HH:MM. Must match the number of entries in date_exclusion_start, used only if #4 = 1
date_exclusion_end = 2024-06-15 23:30

[PROCEDURE_OPTIONS]
#1 = Procedure. Cospectra = 1; Spectra = 2
sps = 1
#2 = Gas. CO2 = 1; H2O = 2; O3 = 3; CH4 = 4; N2O = 5
gss = 1
#3 = Number of classes for cut-off frequency look-up tables first sorting 
#    level. The first sorting variable is wind direction (wd) for non-h2o gases 
#    and relative humidity (rh) for h2o. Used both for cof and CF computation. 
#    If set to 1, the number of classes for the second sorting level is considered.
classnumwd = 1
classnumrh = 8
#6 = Number of classes for cut-off frequency look-up tables second sorting 
#    level (wind speed). The number of classes of "ws" defined by the user is 
#    considered only if number of classes for the first level of sorting for the 
#    selected gas is set to 1 (#3). Otherwise, by default 4 ws classes are used (hard-coded).
classnumcofws = 5
#7 = Number of classes for correction factor look-up tables second sorting 
#    level, unstable (u) and stable (s). This user input is considered only if 
#    the number of classes at  #5 is set to 1, otherwise their value is hard-coded.
classnumcf_u = 8
classnumcf_s = 8
#10 = Horst and Lenschow (2009) equation to use in sensor separation correction 
#     factor computation. Can be either 13 or 16. It is only used when #1 = 2 
#     (procedure : Spectra)
eq = 16
#11 = Anemometer losses for path averaging and time response. Applies the 
#     theoretical correction on reference cospectra before computing the correction factors.
tf_sonic = 1
#12 = Transfer function fit according to Peltola et al. 2021 (square-root of H). 
#     Activated = 1; Inactivated = 0. If activated, will be performed for cospectral approach only (#1 = 1)
tf_peltola = 1
#13 = Plot options (0 = disabled, 1 = enabled)
#     plot_hh   : plot individual half-hour (co)spectra (very verbose)
#     plot_main : main results plots (averaged/unified (co)spectra, transfer functions, CF vs WS)
#     plot_aux  : auxiliary/diagnostic plots (all individual, filtering steps, additional diagnostics)
#     plot_save : save figures to output_path (1) or display interactively (0)
plot_hh = 0
plot_main = 1
plot_aux = 1
plot_save = 1
#14 = Option to use the ICOS-ETC global data flux flag computed according to Vitale et al. 2020. 
#     When activated (= 1), the flags stored in the dedicated csv file accessible at "vitale_path" 
#is used instead of the VM and F flags defined above.
vitale_qc_flags = 0

[EC_SETUP]
#1 = Site name
jsite = BE-Lon
# The below parameters (2-6) are needed only for the spectral approach (#1 of [PROCEDURE_OPTIONS]= 2) because needed in the HL sensor separation formulas.
# They are useless/ignored when applying the co-spectral approach 
#2 = Measurement height (m). It is only used when [PROCEDURE_OPTIONS] #1 = 2 
#    (procedure : Spectra), for the sensor separation term.
zmeas = 2
#3 = Displacement height (m). It is only used when [PROCEDURE_OPTIONS] #1 = 2 
#    (procedure : Spectra), for the sensor separation term.
disph = 0.536
#4 = Vertical sensor separation (m). It is only used when [PROCEDURE_OPTIONS] #1 = 2 
#    (procedure : Spectra), for the sensor separation term.
rsz = -0.04
#5 = Eastward sensor separation (m). It is only used when [PROCEDURE_OPTIONS] #1 = 2 
#    (procedure : Spectra), for the sensor separation term.
rseast = -0.1
#6 = Northward sensor separation (m). It is only used when [PROCEDURE_OPTIONS] #1 = 2 
#    (procedure : Spectra), for the sensor separation term.
rsnorth = 0.17

[USER_LIMITS]
#1 = Wind sector exclusion range ( from north). Data included in this range 
#    will be discarded from the correction procedure.
wdmin = 0
wdmax = 0
#2 = Limits for (co)spectra selection for cof computation. hl : sensible heat [Wm-2]; 
#    fc : main tracer [umolm-2s-1]; le : latent heat [Wm-2]. The flux and limits are used in absolute values.
hl_cof_min = 50
hl_cof_max = 1000
fcl_cof_min = 5
fcl_cof_max = 100
lel_cof_min = 30
lel_cof_max = 1000
#3 = (co)spectral absolute limit. If a single point of a half-hourly normalized (co)spectrum exceeds 
#     this threshold in absolute value, the whole half-hour is discarded for the cof computation. 
#     Unit: normalized (co)spectrum (-). 250 is usually a good choice.
cospec_abs_limit = 250
#4 = Limits for cospectra selection for CF computation, unstable conditions.
#    On sensible heat only [Wm-2]. Only fluxes greater than this threshold are kept.
hl_cf_u_min = 30
#5 = Limits for cospectra selection for CF computation, stable conditions.
#    On sensible heat only [Wm-2]. Only fluxes smaller than this threshold are kept.
hl_cf_s_max = 0
#6 = Additional absolute cap on sensible heat flux used for CF selection [Wm-2].
#     Applied in both unstable and stable conditions.
hl_cf_abs_max = 1000
#7 = Quality flags for Vickers and Mahrt (VM) tests. The VM tests used, when available, 
#    are: spikes, drop-out, skewness hard, discontinuities hard. 
#    0: limit value. If > 0, at least a test failed, and the data is discarded.
fvm = 0
#8 = Quality flags for Foken (F) tests (stationarity and ITC combined): 0 if both < 30%, 
#    1 if any is 30-100%, 2 if any > 100%. If value larger than the threshold, the data is discarded.
ff = 0
#9 = Frequency range for transfer function (TF) quality check [Hz]. The coefficient 
#    of variation of the experimental TF is checked in this range and compared to #9 (varclim).
jtmin = 0.021
jtmax = 0.34
#10 = Limit for the coefficient of variation (std dev/mean) of the TF quality check 
#     range. If it is > varclim, the TF is discarded.
varclim = 1
#11 = Frequency range for TF fitting [Hz]
tfmin = 0.021
tfmax = 10
#12 = Frequency range for local similarity procedure: factor of cof between low and high frequencies
nulim = 0.05

[PROCESSED_DATA]
#1 = Save Read routine output data to files for later use (0: disabled, 1: enabled)
enable_saving = 0
#2 = Inclusion of timestamp in saved intermediate file names (0: use site name only, 1: include timestamp). 
#    Applies only if enable_saving = 1
use_timestamp = 0
#3 = Load previously saved data to speed up reading time (0: disabled, 1: enabled)
enable_loading = 0
#4 = Prefix for the saved files ("site-name" or "site-name_timestamp")
file_prefix = BE-Lon

